short-desc=Lode Runner 3-D is a Nintendo 64 game in the Lode Runner franchise. The game was developed by Big Bang and was released in 1999 in North America and Europe by Infogrames, and in Japan by Banpresto. It is the first 3D game in the Lode Runner series.

